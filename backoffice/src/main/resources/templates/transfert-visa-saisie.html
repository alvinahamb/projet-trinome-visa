<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Transfert de visa - Recherche et création de demande de transfert">
    <title>Transfert de Visa - VISA Backoffice</title>
    <link rel="stylesheet" th:href="@{/style/main.css}">
    <style>
        .transfert-container {
            max-width: 600px;
            margin: 40px auto;
        }

        .search-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .search-group button {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .search-group button:hover {
            background: var(--primary-hover);
        }

        .search-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        .search-result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .search-result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .visa-info {
            margin-top: 15px;
            padding: 15px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .visa-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .visa-info-row:last-child {
            border-bottom: none;
        }

        .visa-info-label {
            font-weight: 600;
            color: var(--mid-text);
        }

        .visa-info-value {
            color: var(--text-color);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
        }

        .btn-continue {
            background: var(--primary-color);
            color: white;
        }

        .btn-continue:hover {
            background: var(--primary-hover);
        }

        .btn-cancel {
            background: var(--border-color);
            color: var(--text-color);
        }

        .btn-cancel:hover {
            background: #ddd;
        }

        .passport-section {
            margin-top: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .passport-section.show {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="transfert-container">
        <div class="page-header" style="text-align: center; margin-bottom: 30px;">
            <h1 class="page-title">✈️ Transfert de Visa</h1>
            <p class="page-subtitle">Recherchez le visa existant pour créer une demande de transfert</p>
        </div>

        <!-- Section de recherche -->
        <div class="search-section">
            <h3 style="margin-bottom: 15px;">Rechercher un Visa</h3>
            <div class="search-group">
                <input type="text" id="referenceInput" placeholder="Entrez la référence du Visa" />
                <button onclick="rechercherVisa()">🔍 Rechercher</button>
            </div>
            <div id="searchResult" class="search-result"></div>
            <div id="visaInfoContainer"></div>
            <div id="actionButtons"></div>
        </div>

        <!-- Section du nouveau passeport -->
        <div id="passportSection" class="passport-section">
            <h3 style="margin-bottom: 15px;">📝 Nouveau Passeport</h3>
            <form id="passportForm">
                <div class="info-row">
                    <div class="form-group">
                        <label for="numeroPasseport">Numéro du passeport <span style="color: var(--danger-color);">*</span></label>
                        <input type="text" id="numeroPasseport" name="numeroPasseport" required>
                    </div>

                    <div class="form-group">
                        <label for="paysDelivrance">Pays de délivrance <span style="color: var(--danger-color);">*</span></label>
                        <input type="text" id="paysDelivrance" name="paysDelivrance" required>
                    </div>
                </div>

                <div class="info-row">
                    <div class="form-group">
                        <label for="dateDelivrance">Date de délivrance <span style="color: var(--danger-color);">*</span></label>
                        <input type="date" id="dateDelivrance" name="dateDelivrance" required>
                    </div>

                    <div class="form-group">
                        <label for="dateExpiration">Date d'expiration <span style="color: var(--danger-color);">*</span></label>
                        <input type="date" id="dateExpiration" name="dateExpiration" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-outline" onclick="annulerTransfert()">← Annuler</button>
                    <button type="submit" class="btn-primary">Créer Demande de Transfert →</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/callApi.js"></script>
    <script>
        let visaFoundData = null;

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('referenceInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    rechercherVisa();
                }
            });

            document.getElementById('passportForm').addEventListener('submit', function(e) {
                e.preventDefault();
                soumettreTransfertVisa();
            });
        });

        function rechercherVisa() {
            const reference = document.getElementById('referenceInput').value.trim();
            
            if (!reference) {
                afficherResultat('error', '❌ Veuillez entrer une référence de Visa');
                return;
            }

            getApi(`/visa/search?reference=${encodeURIComponent(reference)}`)
                .then(response => {
                    if (response.status === 'success' && response.data) {
                        visaFoundData = response.data;
                        afficherResultat('success', '✅ Visa trouvé!');
                        afficherInfosVisa(response.data);
                        afficherBoutonsAction('found');
                        document.getElementById('passportSection').classList.remove('show');
                    } else {
                        visaFoundData = null;
                        afficherResultat('error', '❌ Aucun visa trouvé avec cette référence');
                        afficherBoutonsAction('notfound');
                        document.getElementById('passportSection').classList.remove('show');
                    }
                })
                .catch(error => {
                    console.error('Erreur réseau:', error);
                    visaFoundData = null;
                    afficherResultat('error', '❌ Erreur lors de la recherche. Veuillez réessayer.');
                    afficherBoutonsAction('notfound');
                    document.getElementById('passportSection').classList.remove('show');
                });
        }

        function afficherResultat(type, message) {
            const resultDiv = document.getElementById('searchResult');
            resultDiv.className = `search-result ${type}`;
            resultDiv.textContent = message;
        }

        function afficherInfosVisa(visa) {
            const container = document.getElementById('visaInfoContainer');
            if (visa && Object.keys(visa).length > 0) {
                let html = '<div class="visa-info">';
                
                if (visa.reference) {
                    html += `<div class="visa-info-row">
                        <span class="visa-info-label">Référence:</span>
                        <span class="visa-info-value">${visa.reference}</span>
                    </div>`;
                }
                
                if (visa.nom) {
                    html += `<div class="visa-info-row">
                        <span class="visa-info-label">Titulaire:</span>
                        <span class="visa-info-value">${visa.nom} ${visa.prenom || ''}</span>
                    </div>`;
                }
                
                if (visa.dateDebut) {
                    html += `<div class="visa-info-row">
                        <span class="visa-info-label">Date de début:</span>
                        <span class="visa-info-value">${visa.dateDebut}</span>
                    </div>`;
                }
                
                if (visa.dateFin) {
                    html += `<div class="visa-info-row">
                        <span class="visa-info-label">Date de fin:</span>
                        <span class="visa-info-value">${visa.dateFin}</span>
                    </div>`;
                }

                if (visa.lieuEntree) {
                    html += `<div class="visa-info-row">
                        <span class="visa-info-label">Lieu d'entrée:</span>
                        <span class="visa-info-value">${visa.lieuEntree}</span>
                    </div>`;
                }
                
                html += '</div>';
                container.innerHTML = html;
            } else {
                container.innerHTML = '';
            }
        }

        function afficherBoutonsAction(state) {
            const container = document.getElementById('actionButtons');
            
            if (state === 'found') {
                container.innerHTML = `
                    <div class="action-buttons">
                        <button class="btn-cancel" onclick="annulerTransfert()">← Retour</button>
                        <button class="btn-continue" onclick="afficherFormulairePasseport()">Continuer →</button>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function afficherFormulairePasseport() {
            document.getElementById('passportSection').classList.add('show');
        }

        function soumettreTransfertVisa() {
            if (!visaFoundData) {
                alert('Veuillez d\'abord rechercher un visa');
                return;
            }

            const numeroPasseport = document.getElementById('numeroPasseport').value.trim();
            const paysDelivrance = document.getElementById('paysDelivrance').value.trim();
            const dateDelivrance = document.getElementById('dateDelivrance').value;
            const dateExpiration = document.getElementById('dateExpiration').value;

            if (!numeroPasseport || !paysDelivrance || !dateDelivrance || !dateExpiration) {
                alert('Veuillez remplir tous les champs du passeport');
                return;
            }

            const donnees = {
                visaReference: visaFoundData.reference,
                numeroPasseport: numeroPasseport,
                paysDelivrance: paysDelivrance,
                dateDelivrance: dateDelivrance,
                dateExpiration: dateExpiration
            };

            log.info('Données transfert visa:', donnees);

            postApi('/visa/transfer-request', donnees)
                .then(response => {
                    if (response.status === 'success') {
                        alert('Demande de transfert de visa enregistrée avec succès!');
                        console.log('Réponse:', response.data);
                        window.location.href = '/visa-list';
                    } else {
                        alert('Erreur: ' + response.message);
                        console.error('Erreur:', response.error);
                    }
                })
                .catch(error => {
                    console.error('Erreur réseau:', error);
                    alert('Erreur lors de l\'enregistrement');
                });
        }

        function annulerTransfert() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
