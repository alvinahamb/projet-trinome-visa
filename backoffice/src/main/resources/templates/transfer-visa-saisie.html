<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Transfert de Visa - Recherche et création de demande de transfert de visa"
    />
    <title>Transfert de Visa - VISA Backoffice</title>
    <link rel="stylesheet" th:href="@{/style/main.css}" />
    <style>
      .transfer-visa-container {
        max-width: 600px;
        margin: 40px auto;
      }

      .search-section {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .search-group {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .search-group input {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
      }

      .search-group button {
        padding: 10px 20px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
      }

      .search-group button:hover {
        background: var(--primary-hover);
      }

      .search-result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
        display: none;
      }

      .search-result.success {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
        display: block;
      }

      .search-result.error {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
        display: block;
      }

      .visa-info {
        margin-top: 15px;
        padding: 15px;
        background: #fff;
        border: 1px solid var(--border-color);
        border-radius: 4px;
      }

      .visa-info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }

      .visa-info-row:last-child {
        border-bottom: none;
      }

      .visa-info-label {
        font-weight: 600;
        color: var(--mid-text);
      }

      .visa-info-value {
        color: var(--text-color);
      }

      .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .action-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        font-size: 1rem;
      }

      .btn-continue {
        background: var(--primary-color);
        color: white;
      }

      .btn-continue:hover {
        background: var(--primary-hover);
      }

      .btn-cancel {
        background: var(--border-color);
        color: var(--text-color);
      }

      .btn-cancel:hover {
        background: #ddd;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text-color);
      }

      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.1);
      }

      .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .form-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        font-size: 1rem;
      }

      .btn-primary {
        background: var(--primary-color);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-outline {
        background: transparent;
        color: var(--text-color);
        border: 1px solid var(--border-color);
      }

      .btn-outline:hover {
        background: var(--border-color);
      }
    </style>
  </head>
  <body>
    <div class="transfer-visa-container">
      <div class="page-header" style="text-align: center; margin-bottom: 30px">
        <h1 class="page-title">✈️ Transfert de Visa</h1>
        <p class="page-subtitle">
          Recherchez le visa existant pour créer une demande de transfert
        </p>
      </div>

      <!-- Section de recherche -->
      <div class="search-section">
        <h3 style="margin-bottom: 15px">Rechercher un Visa</h3>
        <div class="search-group">
          <input
            type="text"
            id="referenceInput"
            placeholder="Entrez la référence du Visa"
          />
          <button onclick="rechercherVisa()">🔍 Rechercher</button>
        </div>
        <div id="searchResult" class="search-result"></div>
        <div id="visaInfoContainer"></div>
        <div id="actionButtons"></div>
      </div>

      <!-- Section de formulaire de passeport et type de visa -->
      <div
        id="passportFormSection"
        class="search-section"
        style="display: none"
      >
        <h3 style="margin-bottom: 15px">📄 Informations du Passeport</h3>

        <div class="form-group">
          <label for="passportNumber"
            >Numéro de Passeport
            <span style="color: var(--danger-color)">*</span></label
          >
          <input
            type="text"
            id="passportNumber"
            name="passportNumber"
            required
          />
        </div>

        <div class="form-group">
          <label for="passportCountry"
            >Pays de délivrance
            <span style="color: var(--danger-color)">*</span></label
          >
          <input
            type="text"
            id="passportCountry"
            name="passportCountry"
            required
          />
        </div>

        <div class="form-group">
          <label for="passportDeliveryDate"
            >Date de délivrance
            <span style="color: var(--danger-color)">*</span></label
          >
          <input
            type="date"
            id="passportDeliveryDate"
            name="passportDeliveryDate"
            required
          />
        </div>

        <div class="form-group">
          <label for="passportExpirationDate"
            >Date d'expiration
            <span style="color: var(--danger-color)">*</span></label
          >
          <input
            type="date"
            id="passportExpirationDate"
            name="passportExpirationDate"
            required
          />
        </div>

        <h3 style="margin-bottom: 15px; margin-top: 25px">
          Sélectionnez le type de Visa
        </h3>
        <div class="form-group">
          <label for="visaTypeSelector"
            >Type de visa demandé
            <span style="color: var(--danger-color)">*</span></label
          >
          <select id="visaTypeSelector" required>
            <option value="">Sélectionnez</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline" onclick="annulerDemande()">
            ← Annuler
          </button>
          <button
            type="button"
            class="btn-primary"
            onclick="allerAuFormulaireAvecPasseport()"
          >
            Continuer →
          </button>
        </div>
      </div>
    </div>

    <script src="/js/callApi.js"></script>
    <script>
      let visaFoundData = null;
      let donneesFormulaire = {};

      // Charger les données du formulaire au démarrage
      document.addEventListener("DOMContentLoaded", function () {
        chargerDonneesFormulaire();
        document
          .getElementById("referenceInput")
          .addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
              rechercherVisa();
            }
          });
      });

      function chargerDonneesFormulaire() {
        getApi("/demande-visa/demande-saisie-form")
          .then((response) => {
            if (response.status === "success") {
              donneesFormulaire = response.data;
              remplirTypeVisa();
            } else {
              console.error("Erreur au chargement des données du formulaire");
            }
          })
          .catch((error) => console.error("Erreur réseau:", error));
      }

      function remplirTypeVisa() {
        const select = document.getElementById("visaTypeSelector");
        if (donneesFormulaire.typesVisa) {
          donneesFormulaire.typesVisa.forEach((item, index) => {
            const option = document.createElement("option");
            const idValue = item.id || item.idVisaType || index;
            option.value = idValue;
            option.textContent =
              item.libelle || item.nomVisa || item.designation;
            select.appendChild(option);
          });
        }
      }

      function rechercherVisa() {
        const reference = document
          .getElementById("referenceInput")
          .value.trim();

        if (!reference) {
          afficherResultat("error", "❌ Veuillez entrer une référence de Visa");
          return;
        }

        // Appel API pour chercher le visa
        getApi(`/visa/search?reference=${encodeURIComponent(reference)}`)
          .then((response) => {
            if (response.status === "success" && response.data) {
              visaFoundData = response.data;
              afficherResultat("success", "✅ Visa trouvé avec succès");
              afficherInfosVisa(visaFoundData);
              afficherBoutonsAction("found");
            } else {
              throw new Error("Visa non trouvé");
            }
          })
          .catch((error) => {
            afficherResultat(
              "error",
              "❌ Visa non trouvé. Veuillez sélectionner un type de visa",
            );
            document.getElementById("visaInfoContainer").innerHTML = "";
            afficherBoutonsAction("not-found");
            document.getElementById("visaTypeSelection").classList.add("show");
          });
      }

      function afficherResultat(type, message) {
        const resultDiv = document.getElementById("searchResult");
        resultDiv.className = `search-result ${type}`;
        resultDiv.textContent = message;
      }

      function afficherInfosVisa(visa) {
        const container = document.getElementById("visaInfoContainer");
        if (visa && Object.keys(visa).length > 0) {
          let html = '<div class="visa-info">';

          // Afficher les informations principales du visa
          if (visa.reference) {
            html += `<div class="visa-info-row">
                        <span class="visa-info-label">Référence:</span>
                        <span class="visa-info-value">${visa.reference}</span>
                    </div>`;
          }

          if (visa.demandeurNom) {
            html += `<div class="visa-info-row">
                        <span class="visa-info-label">Demandeur:</span>
                        <span class="visa-info-value">${visa.demandeurNom} ${visa.demandeurPrenom || ""}</span>
                    </div>`;
          }

          if (visa.dateDebut) {
            html += `<div class="visa-info-row">
                        <span class="visa-info-label">Date de début:</span>
                        <span class="visa-info-value">${visa.dateDebut}</span>
                    </div>`;
          }

          if (visa.dateFin) {
            html += `<div class="visa-info-row">
                        <span class="visa-info-label">Date de fin:</span>
                        <span class="visa-info-value">${visa.dateFin}</span>
                    </div>`;
          }

          if (visa.lieuEntree) {
            html += `<div class="visa-info-row">
                        <span class="visa-info-label">Lieu d'entrée:</span>
                        <span class="visa-info-value">${visa.lieuEntree}</span>
                    </div>`;
          }

          html += "</div>";
          container.innerHTML = html;
        } else {
          container.innerHTML = "";
        }
      }

      function afficherBoutonsAction(state) {
        const container = document.getElementById("actionButtons");

        if (state === "found") {
          container.innerHTML = `
                    <div class="action-buttons">
                        <button class="btn-cancel" onclick="annulerDemande()">← Annuler</button>
                        <button class="btn-continue" onclick="allerAuFormulaireAvecVisa()">Continuer →</button>
                    </div>
                `;
          // Afficher le formulaire de passeport
          document.getElementById("passportFormSection").style.display =
            "block";
        } else {
          container.innerHTML = "";
          // Afficher le formulaire de passeport si visa non trouvé
          document.getElementById("passportFormSection").style.display =
            "block";
        }
      }

      function allerAuFormulaireAvecVisa() {
        if (!validerPasseport()) {
          return;
        }

        if (visaFoundData) {
          // Créer une URL pour le formulaire de création avec les paramètres du visa
          const params = new URLSearchParams();
          params.append("transfer_visa", "true");
          params.append("visa_reference", visaFoundData.reference || "");
          ajouterParametresPasseport(params);

          // Rediriger vers le formulaire de création avec les paramètres
          window.location.href = `/demande-visa-saisie?${params.toString()}`;
        }
      }

      function allerAuFormulaireAvecPasseport() {
        if (!validerPasseport()) {
          return;
        }

        const visaTypeId = document.getElementById("visaTypeSelector").value;

        if (!visaTypeId) {
          alert("Veuillez sélectionner un type de visa");
          return;
        }

        const params = new URLSearchParams();
        params.append("transfer_visa", "true");
        params.append("visa_type", visaTypeId);
        ajouterParametresPasseport(params);

        window.location.href = `/demande-visa-saisie?${params.toString()}`;
      }

      function validerPasseport() {
        const numero = document.getElementById("passportNumber").value.trim();
        const pays = document.getElementById("passportCountry").value.trim();
        const dateDelivrance = document.getElementById(
          "passportDeliveryDate",
        ).value;
        const dateExpiration = document.getElementById(
          "passportExpirationDate",
        ).value;

        if (!numero) {
          alert("Veuillez entrer le numéro de passeport");
          return false;
        }

        if (!pays) {
          alert("Veuillez entrer le pays de délivrance");
          return false;
        }

        if (!dateDelivrance) {
          alert("Veuillez entrer la date de délivrance");
          return false;
        }

        if (!dateExpiration) {
          alert("Veuillez entrer la date d'expiration");
          return false;
        }

        // Vérifier que la date d'expiration est après la date de délivrance
        if (new Date(dateExpiration) <= new Date(dateDelivrance)) {
          alert(
            "La date d'expiration doit être postérieure à la date de délivrance",
          );
          return false;
        }

        return true;
      }

      function ajouterParametresPasseport(params) {
        params.append(
          "passport_number",
          document.getElementById("passportNumber").value,
        );
        params.append(
          "passport_country",
          document.getElementById("passportCountry").value,
        );
        params.append(
          "passport_delivery_date",
          document.getElementById("passportDeliveryDate").value,
        );
        params.append(
          "passport_expiration_date",
          document.getElementById("passportExpirationDate").value,
        );
      }

      function annulerDemande() {
        window.location.href = "/";
      }
    </script>
  </body>
</html>
