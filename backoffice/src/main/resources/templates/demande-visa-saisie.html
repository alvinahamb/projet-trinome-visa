<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de VISA</title>
</head>
<body>
    <h1>Demande de enregistrement de VISA</h1>
    <form th:action="@{/demande-visa-saisie}" method="post">
        <h2>Etat civil</h2>
        <label for="nom">Nom:</label>
        <input type="text" id="nom" name="nom" required><br><br>

        <label for="prenom">Prénom:</label>
        <input type="text" id="prenom" name="prenom" required><br><br>

        <label for="genre">Genre:</label>
        <select id="genre" name="genre" required>
            <option value="">Sélectionnez</option>
        </select><br><br>

        <label for="dateNaissance">Date de naissance:</label>
        <input type="date" id="dateNaissance" name="dateNaissance" required><br><br>

        <label for="paysOrigine">Lieu de naissance:</label>
        <input type="text" id="lieuNaissance" name="lieuNaissance" required><br><br>

        <label for="telephone">Téléphone:</label>
        <input type="tel" id="telephone" name="telephone" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="adresse">Adresse:</label>
        <input type="text" id="adresse" name="adresse" required><br><br>

        <label for="nationalite">Nationalité:</label>
        <input type="datalist" id="nationalite" name="nationalite" required><br><br>
        <datalist id="nationalite">
            <option value="Autre">
        </datalist><br><br>


        <h2>Passeport</h2>
        <label for="numero">Numéro du passeport:</label>
        <input type="text" id="numero" name="numero" required><br><br>

        <label for="dateDelivrance">Date de délivrance:</label>
        <input type="date" id="dateDelivrance" name="dateDelivrance" required><br><br>

        <label for="dateExpiration">Date d'expiration:</label>
        <input type="date" id="dateExpiration" name="dateExpiration" required><br><br>

        <label for="paysDelivrance">Pays de délivrance:</label>
        <input type="text" id="paysDelivrance" name="paysDelivrance" required><br><br>


        <h2>Visa transformable actuel</h2>
        <label for="reference">Reference:</label>
        <input type="text" id="reference" name="reference" required><br><br>

        <label for="dateEntree">Date d'entrée:</label>
        <input type="date" id="dateEntree" name="dateEntree" required><br><br>

        <label for="dateFin">Date de fin:</label>
        <input type="date" id="dateFin" name="dateFin" required><br><br>

        <label for="lieuEntree">Lieu d'entrée:</label>
        <input type="text" id="lieuEntree" name="lieuEntee" required><br><br>

        <h2>Type Visa demande</h2>
        <label for="visaType">Type de visa demandé:</label>
        <select id="visaType" name="visaType" required>
            <option value="">Sélectionnez</option>
        </select><br><br>

        <button type="submit">Enregistrer</button>    
</body>
</html>
