<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulaire d'enregistrement de demande de VISA"
    />
    <title>Nouvelle Demande de VISA</title>
    <link rel="stylesheet" th:href="@{/style/main.css}" />
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">📝 Demande d'enregistrement de VISA</h1>
        <p class="page-subtitle">
          Veuillez remplir tous les champs obligatoires
        </p>
      </div>

      <div class="form-container">
        <form id="demandeVisaForm" method="post">
          <!-- Hidden input for duplicata flag -->
          <input
            type="hidden"
            id="isDuplicata"
            name="isDuplicata"
            value="false"
          />

          <!-- Hidden input for transfer visa flag -->
          <input
            type="hidden"
            id="isTransferVisa"
            name="isTransferVisa"
            value="false"
          />

          <div class="card-section">
            <h4>👤 État civil</h4>
            <div class="info-row">
              <div class="form-group">
                <label for="nom"
                  >Nom <span style="color: var(--danger-color)">*</span></label
                >
                <input type="text" id="nom" name="nom" required />
              </div>

              <div class="form-group">
                <label for="prenom"
                  >Prénom
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="text" id="prenom" name="prenom" required />
              </div>
            </div>

            <div class="info-row">
              <div class="form-group">
                <label for="genre"
                  >Genre
                  <span style="color: var(--danger-color)">*</span></label
                >
                <select id="genre" name="genre" required>
                  <option value="">Sélectionnez</option>
                </select>
              </div>

              <div class="form-group">
                <label for="dateNaissance"
                  >Date de naissance
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="date"
                  id="dateNaissance"
                  name="dateNaissance"
                  required
                />
              </div>
            </div>

            <div class="info-row">
              <div class="form-group">
                <label for="lieuNaissance"
                  >Lieu de naissance
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="text"
                  id="lieuNaissance"
                  name="lieuNaissance"
                  required
                />
              </div>

              <div class="form-group">
                <label for="nationalite"
                  >Nationalité
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="text"
                  id="nationalite"
                  name="nationalite"
                  list="nationalitesList"
                  required
                />
                <datalist id="nationalitesList">
                  <!-- Les nationalités seront ajoutées dynamiquement ici -->
                </datalist>
              </div>
            </div>

            <div class="info-row">
              <div class="form-group">
                <label for="telephone"
                  >Téléphone
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="tel" id="telephone" name="telephone" required />
              </div>

              <div class="form-group">
                <label for="email"
                  >Email
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="email" id="email" name="email" required />
              </div>
            </div>

            <div class="form-group">
              <label for="adresse"
                >Adresse
                <span style="color: var(--danger-color)">*</span></label
              >
              <input type="text" id="adresse" name="adresse" required />
            </div>

            <div class="form-group">
              <label for="situationFamiliale"
                >Situation familiale
                <span style="color: var(--danger-color)">*</span></label
              >
              <select
                id="situationFamiliale"
                name="situationFamiliale"
                required
              >
                <option value="">Sélectionnez</option>
              </select>
            </div>
          </div>

          <div class="card-section">
            <h4>🛂 Passeport</h4>
            <div class="info-row">
              <div class="form-group">
                <label for="numeroPasseport"
                  >Numéro du passeport
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="text"
                  id="numeroPasseport"
                  name="numeroPasseport"
                  required
                />
              </div>

              <div class="form-group">
                <label for="paysDelivrance"
                  >Pays de délivrance
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="text"
                  id="paysDelivrance"
                  name="paysDelivrance"
                  required
                />
              </div>
            </div>

            <div class="info-row">
              <div class="form-group">
                <label for="dateDelivrance"
                  >Date de délivrance
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="date"
                  id="dateDelivrance"
                  name="dateDelivrance"
                  required
                />
              </div>

              <div class="form-group">
                <label for="dateExpiration"
                  >Date d'expiration
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="date"
                  id="dateExpiration"
                  name="dateExpiration"
                  required
                />
              </div>
            </div>
          </div>

          <div class="card-section">
            <h4>🌍 Visa transformable actuel</h4>
            <div class="info-row">
              <div class="form-group">
                <label for="referenceVisa"
                  >Référence
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input
                  type="text"
                  id="referenceVisa"
                  name="referenceVisa"
                  required
                />
              </div>

              <div class="form-group">
                <label for="lieuEntree"
                  >Lieu d'entrée
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="text" id="lieuEntree" name="lieuEntree" required />
              </div>
            </div>

            <div class="info-row">
              <div class="form-group">
                <label for="dateEntree"
                  >Date d'entrée
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="date" id="dateEntree" name="dateEntree" required />
              </div>

              <div class="form-group">
                <label for="dateFin"
                  >Date de fin
                  <span style="color: var(--danger-color)">*</span></label
                >
                <input type="date" id="dateFin" name="dateFin" required />
              </div>
            </div>
          </div>

          <div class="card-section">
            <h4>✈️ Type de Visa demandé</h4>
            <div class="form-group">
              <label for="visaType"
                >Type de visa demandé
                <span style="color: var(--danger-color)">*</span></label
              >
              <select id="visaType" name="visaType" required>
                <option value="">Sélectionnez</option>
              </select>
            </div>
          </div>

          <div class="card-section">
            <h4>📄 Pièces justificatives requises</h4>
            <div id="piecesContainer" class="pieces-container">
              <!-- Les pièces seront ajoutées dynamiquement ici -->
            </div>
          </div>

          <div class="form-actions">
            <button
              type="button"
              class="btn btn-outline"
              onclick="window.location.href = '/'"
            >
              ← Annuler
            </button>
            <button type="submit" class="btn btn-primary btn-large">
              💾 Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/callApi.js"></script>
    <script>
      // Stockage des données
      let donneesFormulaire = {};

      // Fonction pour extraire les paramètres de l'URL
      function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          isDuplicata: params.get("carte_resident") === "true",
          visaReference: params.get("visa_reference"),
          visaType: params.get("visa_type"),
          isTransferVisa: params.get("transfer_visa") === "true",
          transferVisaReference: params.get("visa_reference"),
          passportNumber: params.get("passport_number"),
          passportCountry: params.get("passport_country"),
          passportDeliveryDate: params.get("passport_delivery_date"),
          passportExpirationDate: params.get("passport_expiration_date"),
        };
      }

      // Charger les données au chargement de la page
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = getUrlParams();

        // Définir le flag duplicata
        if (urlParams.isDuplicata) {
          document.getElementById("isDuplicata").value = "true";
        }

        if (urlParams.isTransferVisa) {
          // Définir le flag transfert visa
          document.getElementById("isTransferVisa").value = "true"; // Assurer que ce n'est pas un duplicata

          // Pré-remplir le formulaire si transfert visa
          setTimeout(() => {
            if (urlParams.passportNumber) {
              document.getElementById("numeroPasseport").value =
                urlParams.passportNumber;
            }
            if (urlParams.passportCountry) {
              document.getElementById("paysDelivrance").value =
                urlParams.passportCountry;
            }
            if (urlParams.passportDeliveryDate) {
              document.getElementById("dateDelivrance").value =
                urlParams.passportDeliveryDate;
            }
            if (urlParams.passportExpirationDate) {
              document.getElementById("dateExpiration").value =
                urlParams.passportExpirationDate;
            }
          }, 500);
        }

        chargerDonneesFormulaire();

        // Si c'est un duplicata avec un type de visa spécifié, le pré-sélectionner
        if (urlParams.isDuplicata && urlParams.visaType) {
          setTimeout(() => {
            const select = document.getElementById("visaType");
            select.value = urlParams.visaType;
            afficherPiecesParTypeVisa();
          }, 1000); // Attendre que le formulaire soit rempli
        }

        // Si c'est un transfert de visa avec un type de visa spécifié, le pré-sélectionner
        if (urlParams.isTransferVisa && urlParams.visaType) {
          setTimeout(() => {
            const select = document.getElementById("visaType");
            select.value = urlParams.visaType;
            afficherPiecesParTypeVisa();
          }, 1000); // Attendre que le formulaire soit rempli
        }
      });

      // Charger toutes les données du formulaire en une seule requête
      function chargerDonneesFormulaire() {
        getApi("/demande-visa/demande-saisie-form")
          .then((response) => {
            if (response.status === "success") {
              donneesFormulaire = response.data;
              remplirFormulaire();
            } else {
              console.error("Erreur:", response.error);
              alert("Erreur: " + response.message);
            }
          })
          .catch((error) => console.error("Erreur réseau:", error));
      }

      // Remplir les selects du formulaire
      function remplirFormulaire() {
        // Remplir les genres
        remplirSelect("genre", donneesFormulaire.genres);

        // Remplir la datalist des nationalités
        remplirDatalist("nationalitesList", donneesFormulaire.nationalites);

        // Remplir les situations familiales
        remplirSelect(
          "situationFamiliale",
          donneesFormulaire.situationsFamiliales,
        );

        // Remplir les types de visa
        remplirSelect("visaType", donneesFormulaire.typesVisa);

        // Ajouter l'événement de changement du type de visa
        document
          .getElementById("visaType")
          .addEventListener("change", afficherPiecesParTypeVisa);
      }

      // Fonction générique pour remplir un select
      function remplirSelect(selectId, donnees) {
        const select = document.getElementById(selectId);
        donnees.forEach((item, index) => {
          const option = document.createElement("option");
          // Essayer plusieurs noms de propriété pour l'ID
          const idValue =
            item.id ||
            item.idGenre ||
            item.idNationalite ||
            item.idSituationFamiliale ||
            item.idVisaType ||
            index;
          option.value = idValue;
          option.textContent =
            item.libelle || item.nom || item.nomVisa || item.designation;
          console.log(`Option ${selectId}:`, {
            idValue,
            text: option.textContent,
            item,
          });
          select.appendChild(option);
        });
      }

      // Fonction pour remplir une datalist
      function remplirDatalist(datalistId, donnees) {
        const datalist = document.getElementById(datalistId);
        donnees.forEach((item, index) => {
          const option = document.createElement("option");
          const idValue = item.id || item.idNationalite || index;
          option.value = idValue;
          option.textContent = item.libelle || item.nom;
          datalist.appendChild(option);
        });
      }

      // Afficher les pièces justificatives selon le type de visa sélectionné
      function afficherPiecesParTypeVisa() {
        const visaTypeId = document.getElementById("visaType").value;
        const piecesContainer = document.getElementById("piecesContainer");

        // Vider le conteneur
        piecesContainer.innerHTML = "";

        if (!visaTypeId) {
          piecesContainer.innerHTML =
            "<p>Sélectionnez un type de visa pour voir les pièces requises</p>";
          return;
        }

        // Filtrer les pièces justificatives selon le type de visa sélectionné
        const piecesParTypeVisa = donneesFormulaire.piecesJustificatives.filter(
          (piece) => {
            // Vérifier si la pièce appartient au type de visa sélectionné
            return (
              piece.typeVisa &&
              piece.typeVisa.id &&
              piece.typeVisa.id == visaTypeId
            );
          },
        );

        if (piecesParTypeVisa.length === 0) {
          piecesContainer.innerHTML =
            "<p>Aucune pièce requise pour ce type de visa</p>";
          return;
        }

        // Créer les checkboxes pour chaque pièce filtrée
        piecesParTypeVisa.forEach((piece) => {
          const div = document.createElement("div");
          div.className = "piece-item";

          const input = document.createElement("input");
          input.type = "checkbox";
          input.id = "piece_" + piece.id;
          input.name = "pieces";
          input.value = piece.id;

          const label = document.createElement("label");
          label.htmlFor = "piece_" + piece.id;
          const libelle =
            piece.libelle ||
            piece.designation ||
            piece.nom ||
            "Pièce " + piece.id;
          label.textContent = libelle;

          div.appendChild(input);
          div.appendChild(label);
          piecesContainer.appendChild(div);
        });
      }

      // Soumettre le formulaire en POST
      document
        .getElementById("demandeVisaForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          // Récupérer les données du formulaire
          const formData = new FormData(this);
          const donnees = Object.fromEntries(formData);

          console.log("Données brutes du formulaire:", donnees);

          // Convertir les champs numériques en integers (avec validation)
          donnees.genre =
            donnees.genre && donnees.genre !== ""
              ? parseInt(donnees.genre, 10)
              : null;
          donnees.nationalite =
            donnees.nationalite && donnees.nationalite !== ""
              ? parseInt(donnees.nationalite, 10)
              : null;
          donnees.situationFamiliale =
            donnees.situationFamiliale && donnees.situationFamiliale !== ""
              ? parseInt(donnees.situationFamiliale, 10)
              : null;
          donnees.visaType =
            donnees.visaType && donnees.visaType !== ""
              ? parseInt(donnees.visaType, 10)
              : null;

          // Convertir le flag duplicata en booléen
          donnees.isDuplicata = donnees.isDuplicata === "true";

          // Récupérer les pièces sélectionnées
          const piecesSelectionnees = Array.from(
            document.querySelectorAll('input[name="pieces"]:checked'),
          ).map((checkbox) => parseInt(checkbox.value, 10));
          donnees.pieces = piecesSelectionnees;

          console.log("Données à enregistrer:", donnees);

          // Appel POST
          postApi("/demande-visa/demande-saisie-ajout", donnees)
            .then((response) => {
              if (response.status === "success") {
                alert("Demande enregistrée avec succès!");
                console.log("Réponse:", response.data);
                // Rediriger ou réinitialiser le formulaire si besoin
              } else {
                alert("Erreur: " + response.message);
                console.error("Erreur:", response.error);
              }
            })
            .catch((error) => {
              console.error("Erreur réseau:", error);
              alert("Erreur lors de l'enregistrement");
            });
        });
    </script>
  </body>
</html>
