<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liste de toutes les demandes de VISA">
    <title>Liste des Demandes de VISA</title>
    <link rel="stylesheet" th:href="@{/style/main.css}">
</head>
<body>
    <div class="container-large">
        <div class="page-header">
            <h1 class="page-title">📋 Liste des Demandes d'enregistrement de VISA</h1>
            <p class="page-subtitle">Consultez et gérez toutes vos demandes de visa</p>
        </div>

        <div id="errorContainer"></div>
        
        <div id="loadingMessage" class="loading">
            ⏳ Chargement des demandes...
        </div>
        
        <div id="demandesContainer" class="demandes-container" style="display: none;"></div>
        
        <div class="list-actions" style="margin-top: 30px; padding-top: 30px; border-top: 2px solid var(--border-color);">
            <button class="btn btn-secondary" onclick="window.location.href='/'">← Retour</button>
            <button class="btn btn-primary" onclick="location.reload()">🔄 Rafraîchir</button>
        </div>
    </div>

    <script src="/js/callApi.js"></script>
    <script>
        const CHAMPS_OBLIGATOIRES = {
            nom: true,
            prenom: true,
            genre: true,
            dateNaissance: true,
            lieuNaissance: false,
            nationalite: true,
            telephone: false,
            email: false,
            adresse: false,
            situationFamiliale: false,
            numeroPasseport: true,
            paysDelivrance: false,
            dateDelivrance: true,
            dateExpiration: true,
            referenceVisa: true,
            dateEntree: false,
            dateFin: false,
            lieuEntree: false,
            visaType: true
        };

        function estChampObligatoire(nomChamp) {
            return Boolean(CHAMPS_OBLIGATOIRES[nomChamp]);
        }

        // Stockage des données
        let donneesFormulaire = {};
        
        // Charger les demandes au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            chargerDonneesFormulaire();
        });

        // Charger les données du formulaire (genres, nationalités, etc.)
        function chargerDonneesFormulaire() {
            getApi('/demande-visa/demande-saisie-form')
                .then(response => {
                    if (response.status === 'success') {
                        donneesFormulaire = response.data;
                        chargerListeDemandes();
                    } else {
                        afficherErreur('Erreur lors du chargement des données: ' + response.message);
                    }
                })
                .catch(error => {
                    afficherErreur('Erreur réseau: ' + error);
                    console.error('Erreur réseau:', error);
                });
        }

        // Charger la liste des demandes
        function chargerListeDemandes() {
            getApi('/demande-visa/demande-list')
                .then(response => {
                    if (response.status === 'success') {
                        afficherDemandes(response.data);
                    } else {
                        afficherErreur('Erreur: ' + response.message);
                        console.error('Erreur:', response.error);
                    }
                })
                .catch(error => {
                    afficherErreur('Erreur réseau: ' + error);
                    console.error('Erreur réseau:', error);
                });
        }

        // Afficher les demandes
        function afficherDemandes(demandes) {
            const container = document.getElementById('demandesContainer');
            const loadingMessage = document.getElementById('loadingMessage');
            
            loadingMessage.style.display = 'none';
            
            if (!demandes || demandes.length === 0) {
                container.innerHTML = '<div class="empty-message">Aucune demande enregistrée</div>';
                container.style.display = 'block';
                return;
            }

            container.innerHTML = '';
            
            demandes.forEach((demande, index) => {
                const card = creerCarteDemandeHTML(demande, index + 1);
                container.appendChild(card);
            });
            
            container.style.display = 'block';
        }

        // Créer la carte HTML pour une demande
        function creerCarteDemandeHTML(demande, numero) {
            const div = document.createElement('div');
            div.className = 'demande-card';
            div.id = 'demande_' + demande.id;
            
            let html = `
                <div class="demande-header">
                    <h3>Demande #${numero}</h3>
                    <span class="status-badge ${getStatusClass(demande.statut)}">${formatNonNull(demande.statut)}</span>
                </div>
                
                <div class="display-mode">
                    <div class="demande-section">
                        <h4>👤 État civil</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Nom</span>
                                <span class="info-value">${formatNonNull(demande.nom)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Prénom</span>
                                <span class="info-value">${formatNonNull(demande.prenom)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Genre</span>
                                <span class="info-value">${formatNonNull(demande.genre)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date de naissance</span>
                                <span class="info-value">${formatDate(demande.dateNaissance)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Lieu de naissance</span>
                                <span class="info-value">${formatNonNull(demande.lieuNaissance)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Nationalité</span>
                                <span class="info-value">${formatNonNull(demande.nationalite)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Situation familiale</span>
                                <span class="info-value">${formatNonNull(demande.situationFamiliale)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Téléphone</span>
                                <span class="info-value">${formatNonNull(demande.telephone)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Email</span>
                                <span class="info-value">${formatNonNull(demande.email)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Adresse</span>
                                <span class="info-value">${formatNonNull(demande.adresse)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>🛂 Passeport</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Numéro du passeport</span>
                                <span class="info-value">${formatNonNull(demande.numeroPasseport)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Pays de délivrance</span>
                                <span class="info-value">${formatNonNull(demande.paysDelivrance)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Date de délivrance</span>
                                <span class="info-value">${formatDate(demande.dateDelivrance)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date d'expiration</span>
                                <span class="info-value">${formatDate(demande.dateExpiration)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>🌍 Visa transformable actuel</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Référence</span>
                                <span class="info-value">${formatNonNull(demande.referenceVisa)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Lieu d'entrée</span>
                                <span class="info-value">${formatNonNull(demande.lieuEntree)}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Date d'entrée</span>
                                <span class="info-value">${formatDate(demande.dateEntree)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date de fin</span>
                                <span class="info-value">${formatDate(demande.dateFin)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>✈️ Type de visa demandé</h4>
                        <div class="info-item">
                            <span class="info-label">Type</span>
                            <span class="info-value">${formatNonNull(demande.visaType)}</span>
                        </div>
                    </div>
            `;
            
            if (demande.pieces && demande.pieces.length > 0) {
                html += `
                    <div class="demande-section">
                        <h4>Pièces justificatives</h4>
                        <div class="pieces-list">
                `;
                demande.pieces.forEach((piece, index) => {
                    const pieceId = demande.piecesIds && demande.piecesIds[index] ? demande.piecesIds[index] : null;
                    if (pieceId) {
                        html += `<span class="piece-badge">${piece} <a href="/demande-visa/download-piece/${pieceId}" class="download-link" title="Télécharger">📥</a></span>`;
                    } else {
                        html += `<span class="piece-badge">${piece}</span>`;
                    }
                });
                html += `</div></div>`;
            }
            
            html += `</div>`;            
            // Bouton Modifier en mode affichage
            if ((demande.statut || '').toUpperCase() === 'CREE') {
                html += `
                    <div class="display-mode" style="text-align: right; margin-top: 15px;">
                        <button type="button" class="btn btn-outline" onclick="activerEdition('demande_${demande.id}')">✏️ Modifier</button>
                    </div>
                `;
            } else {
                html += `
                    <div class="display-mode" style="text-align: right; margin-top: 15px; color: var(--text-muted);">
                        Modification impossible pour ce statut.
                    </div>
                `;
            }

            // Mode édition
            html += `
                <form class="edit-mode" id="form_${demande.id}">
                    <div class="demande-section">
                        <h4>État civil</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Nom</span>
                                <input type="text" class="edit-input" name="nom" value="${formatNonNull(demande.nom)}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Prénom</span>
                                <input type="text" class="edit-input" name="prenom" value="${formatNonNull(demande.prenom)}">
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Genre</span>
                                <select class="edit-input" name="genre">
                                    <option value="">Sélectionnez</option>
                                    ${donneesFormulaire.genres ? donneesFormulaire.genres.map(g => 
                                        `<option value="${g.id}" ${g.libelle === demande.genre ? 'selected' : ''}>${g.libelle}</option>`
                                    ).join('') : ''}
                                </select>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date de naissance</span>
                                <input type="date" class="edit-input" name="dateNaissance" value="${demande.dateNaissance || ''}">
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Lieu de naissance</span>
                                <input type="text" class="edit-input" name="lieuNaissance" value="${formatNonNull(demande.lieuNaissance)}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Nationalité</span>
                                <select class="edit-input" name="nationalite">
                                    <option value="">Sélectionnez</option>
                                    ${donneesFormulaire.nationalites ? donneesFormulaire.nationalites.map(n => 
                                        `<option value="${n.id}" ${n.libelle === demande.nationalite ? 'selected' : ''}>${n.libelle}</option>`
                                    ).join('') : ''}
                                </select>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Situation familiale</span>
                                <select class="edit-input" name="situationFamiliale">
                                    <option value="">Sélectionnez</option>
                                    ${donneesFormulaire.situationsFamiliales ? donneesFormulaire.situationsFamiliales.map(s => 
                                        `<option value="${s.id}" ${s.libelle === demande.situationFamiliale ? 'selected' : ''}>${s.libelle}</option>`
                                    ).join('') : ''}
                                </select>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Téléphone</span>
                                <input type="text" class="edit-input" name="telephone" value="${formatNonNull(demande.telephone)}">
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Email</span>
                                <input type="email" class="edit-input" name="email" value="${formatNonNull(demande.email)}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Adresse</span>
                                <input type="text" class="edit-input" name="adresse" value="${formatNonNull(demande.adresse)}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>Passeport</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Numéro du passeport</span>
                                <input type="text" class="edit-input" name="numeroPasseport" value="${formatNonNull(demande.numeroPasseport)}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Pays de délivrance</span>
                                <input type="text" class="edit-input" name="paysDelivrance" value="${formatNonNull(demande.paysDelivrance)}">
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Date de délivrance</span>
                                <input type="date" class="edit-input" name="dateDelivrance" value="${demande.dateDelivrance || ''}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date d'expiration</span>
                                <input type="date" class="edit-input" name="dateExpiration" value="${demande.dateExpiration || ''}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>Visa transformable actuel</h4>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Référence</span>
                                <input type="text" class="edit-input" name="referenceVisa" value="${formatNonNull(demande.referenceVisa)}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Lieu d'entrée</span>
                                <input type="text" class="edit-input" name="lieuEntree" value="${formatNonNull(demande.lieuEntree)}">
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Date d'entrée</span>
                                <input type="date" class="edit-input" name="dateEntree" value="${demande.dateEntree || ''}">
                            </div>
                            <div class="info-item">
                                <span class="info-label">Date de fin</span>
                                <input type="date" class="edit-input" name="dateFin" value="${demande.dateFin || ''}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>Type de visa demandé</h4>
                        <div class="info-item">
                            <span class="info-label">Type</span>
                            <select class="edit-input" name="visaType">
                                <option value="">Sélectionnez</option>
                                ${donneesFormulaire.typesVisa ? donneesFormulaire.typesVisa.map(v => 
                                    `<option value="${v.id}" ${String(v.id) === String(demande.visaTypeId) ? 'selected' : ''}>${v.libelle}</option>`
                                ).join('') : ''}
                            </select>
                        </div>
                    </div>
                    
                    <div class="demande-section">
                        <h4>Pièces justificatives</h4>
                        <div class="pieces-container" id="pieces_container_${demande.id}">
                        </div>
                    </div>
                    
                    <div class="edit-actions">
                        <button type="button" class="btn btn-outline" onclick="annulerEdition('demande_${demande.id}')">← Annuler</button>
                        <button type="submit" class="btn btn-primary">💾 Enregistrer les modifications</button>
                    </div>
                </form>
            `;
            
            div.innerHTML = html;

            // Rendre les pièces uploadables selon le type de visa sélectionné
            renderPiecesEdition(div, demande);
            appliquerContraintesEdition(div);
            
            // Ajouter l'événement du formulaire
            const form = div.querySelector(`#form_${demande.id}`);
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const formData = new FormData(this);
                    console.log('Données à enregistrer:', Object.fromEntries(formData.entries()));

                    // Appel API multipart pour enregistrer les modifications
                    fetch(`/demande-visa/demande-update/${demande.id}`, {
                        method: 'PUT',
                        body: formData
                    })
                        .then(response => {
                            if (!response.ok) {
                                return response.json().then(err => Promise.reject(err));
                            }
                            return response.json();
                        })
                        .then(response => {
                            if (response.status === 'success') {
                                alert('Demande mise à jour avec succès!');
                                annulerEdition(`demande_${demande.id}`);
                                // Recharger les demandes
                                chargerListeDemandes();
                            } else {
                                alert('Erreur: ' + response.message);
                                console.error('Erreur:', response.error);
                            }
                        })
                        .catch(error => {
                            console.error('Erreur réseau:', error);
                            alert('Erreur lors de la mise à jour');
                        });
                });
            }
            
            return div;
        }

        // Formatter une date
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR');
        }

        // Formatter une valeur (retourner - si null ou vide)
        function formatNonNull(value) {
            return (value === null || value === undefined || value === '') ? '-' : value;
        }
        
        // Déterminer la classe CSS du statut
        function getStatusClass(statut) {
            if (!statut) return 'status-badge other';
            const lowerStatut = statut.toLowerCase();
            if (lowerStatut.includes('approuv')) return 'status-badge approuve';
            if (lowerStatut.includes('rejet')) return 'status-badge rejete';
            if (lowerStatut.includes('en cours')) return 'status-badge en-cours';
            if (lowerStatut.includes('attent')) return 'status-badge en-attente';
            return 'status-badge other';
        }

        // Afficher une erreur
        function afficherErreur(message) {
            const errorContainer = document.getElementById('errorContainer');
            const loadingMessage = document.getElementById('loadingMessage');
            
            loadingMessage.style.display = 'none';
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            
            errorContainer.appendChild(errorDiv);
        }
        
        // Activer le mode édition
        function activerEdition(demandeId) {
            const card = document.getElementById(demandeId);
            if (card) {
                const statutBadge = card.querySelector('.status-badge');
                if (statutBadge && statutBadge.textContent.trim().toUpperCase() !== 'CREE') {
                    alert('Cette demande ne peut plus être modifiée.');
                    return;
                }
                card.classList.add('editing');
            }
        }
        
        // Annuler le mode édition
        function annulerEdition(demandeId) {
            const card = document.getElementById(demandeId);
            if (card) {
                card.classList.remove('editing');
            }
        }

        function renderPiecesEdition(card, demande) {
            const container = card.querySelector(`#pieces_container_${demande.id}`);
            const selectVisa = card.querySelector('select[name="visaType"]');

            if (!container || !donneesFormulaire.piecesJustificatives) {
                return;
            }

            const typeVisaId = selectVisa && selectVisa.value ? parseInt(selectVisa.value, 10) : demande.visaTypeId;
            const piecesFiltrees = donneesFormulaire.piecesJustificatives.filter(piece => {
                return piece.typeVisa && piece.typeVisa.id === typeVisaId;
            });

            const piecesActuelles = {};
            if (demande.piecesJustificativeIds && demande.piecesIds && demande.pieces) {
                demande.piecesJustificativeIds.forEach((pieceId, index) => {
                    piecesActuelles[pieceId] = {
                        demandePieceId: demande.piecesIds[index],
                        nomFichier: demande.pieces[index]
                    };
                });
            }

            if (piecesFiltrees.length === 0) {
                container.innerHTML = '<p>Aucune pièce disponible pour ce type de visa</p>';
                return;
            }

            container.innerHTML = piecesFiltrees.map(piece => {
                const infoPiece = piecesActuelles[piece.id];
                const estObligatoire = Boolean(piece.estObligatoire);
                const lienFichier = infoPiece ? `<a href="/demande-visa/download-piece/${infoPiece.demandePieceId}" target="_blank">${infoPiece.nomFichier}</a>` : '<span>Aucun fichier uploadé</span>';
                return `
                    <div class="piece-item">
                        <input type="hidden" name="pieces" value="${piece.id}">
                        <label class="file-label" for="piece_${piece.id}">${piece.libelle}${estObligatoire ? ' *' : ' (optionnelle)'}</label>
                        <div style="margin: 6px 0 10px; font-size: 0.9rem;">
                            ${lienFichier}
                        </div>
                        <input type="file" id="piece_${piece.id}" name="piece_${piece.id}" accept=".pdf" ${estObligatoire && !infoPiece ? 'required' : ''}>
                    </div>
                `;
            }).join('');

            if (selectVisa) {
                selectVisa.onchange = () => renderPiecesEdition(card, demande);
            }
        }

        function appliquerContraintesEdition(card) {
            if (!card) {
                return;
            }

            card.querySelectorAll("[name]").forEach((element) => {
                const champ = element.getAttribute("name");
                if (!champ || champ.startsWith("piece_")) {
                    return;
                }

                if (element.type === 'file' || element.type === 'hidden' || element.type === 'checkbox') {
                    return;
                }

                if (estChampObligatoire(champ)) {
                    element.setAttribute("required", "required");
                } else {
                    element.removeAttribute("required");
                }
            });
        }
    </script>
    </div>
</body>
</html>
