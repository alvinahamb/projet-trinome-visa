version: '3.8'

services:
  react:
    image: node:20-alpine
    container_name: react-app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8081
    command: sh -c "npm install && npm run dev"
    networks:
      - visa-network

networks:
  visa-network:
    driver: bridge
