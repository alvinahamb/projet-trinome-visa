version: '3.8'

services:
  react:
    image: node:20-alpine
    container_name: react-app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - visa-network
    restart: unless-stopped

networks:
  visa-network:
    driver: bridge

